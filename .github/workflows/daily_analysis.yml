name: 📊 Professional Stock Analysis

on:
  schedule:
    # Runs Monday-Friday at 4:00 PM Eastern Time (after market close)
    - cron: '0 20 * * 1-5'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      stocks:
        description: 'Stock symbols (comma-separated, e.g., AAPL,MSFT,NVDA)'
        required: false
        default: 'SPY,QQQ,AAPL,MSFT,NVDA,GOOGL,TSLA'
        type: string

jobs:
  analyze-stocks:
    runs-on: ubuntu-latest
    name: 🚀 Run Stock Analysis
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔍 Run Stock Analysis
        env:
          # API Keys (add these to your GitHub Secrets)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${{ github.event.inputs.stocks }}" ]; then
            python stock_analysis.py
          else
            python stock_analysis.py --stocks "${{ github.event.inputs.stocks }}"
          fi
      
      - name: 📤 Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-reports-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: 📧 Send Email Report (Optional)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 📊 Stock Analysis Report - ${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Analyzer
          body: Please find attached the stock analysis report.
          attachments: reports/analysis_report.txt
        continue-on-error: true
